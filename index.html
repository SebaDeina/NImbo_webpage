<!DOCTYPE html>
<html lang="es" data-hero="cinematic" data-grain="on">
<head>
  <script>
    try {
      var t = localStorage.getItem('nimbo_theme');
      document.documentElement.dataset.theme = t || 'light';
    } catch (e) {
      document.documentElement.dataset.theme = 'light';
    }
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="theme-color" content="#050e20" />
  <title>Nimbo — Páginas Web y Automatización para Negocios en Argentina</title>
  <meta name="description" content="Diseño de páginas web profesionales y automatización con IA para negocios en Argentina. Más clientes, menos trabajo manual. Consultá gratis." />
  <meta name="keywords" content="pagina web Argentina, diseño web profesional, automatización negocios Argentina, IA para pymes, pagina web para mi negocio, automatizaciones Argentina" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://www.nimbodata.com/" />

  <!-- Geo targeting Argentina -->
  <meta name="geo.region" content="AR" />
  <meta name="geo.country" content="AR" />
  <meta name="language" content="es-AR" />

  <!-- Open Graph -->
  <meta property="og:title" content="Nimbo — Páginas Web y Automatización en Argentina" />
  <meta property="og:description" content="Diseñamos páginas web profesionales y automatizamos procesos con IA para que tu negocio escale. Basados en Argentina." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.nimbodata.com/" />
  <meta property="og:locale" content="es_AR" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Nimbo — Páginas Web y Automatización en Argentina" />
  <meta name="twitter:description" content="Diseñamos páginas web profesionales y automatizamos procesos con IA para que tu negocio escale." />

  <!-- Schema.org -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ProfessionalService",
    "name": "Nimbo",
    "description": "Agencia de diseño de páginas web y automatización con IA para negocios en Argentina. Páginas web profesionales, chatbots, automatización de procesos.",
    "url": "https://www.nimbodata.com",
    "areaServed": { "@type": "Country", "name": "Argentina" },
    "serviceType": ["Diseño de páginas web", "Automatización de negocios", "Inteligencia Artificial"],
    "knowsLanguage": "es-AR",
    "offers": [
      { "@type": "Offer", "name": "Diseño de página web profesional", "description": "Páginas web para negocios argentinos que convierten visitantes en clientes" },
      { "@type": "Offer", "name": "Automatización con IA", "description": "Automatización de procesos, chatbots y flujos de trabajo para pymes argentinas" }
    ]
  }
  </script>

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" /></noscript>
  <style>
    #splash{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;
      background:#ffffff;transition:opacity .45s ease}
    :root[data-theme="dark"] #splash{background:#050e20}
    #splash.done{opacity:0;pointer-events:none}
    .splash-word{margin:0;font-family:'Inter',system-ui,sans-serif;font-size:clamp(52px,14vw,96px);
      font-weight:800;letter-spacing:-.03em;color:#0a1628;animation:splash-in .7s ease both}
    :root[data-theme="dark"] .splash-word{color:#ffffff}
    @keyframes splash-in{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}
    #root{position:relative;z-index:1}
  </style>
</head>
<body>
  <div id="splash" aria-live="polite" aria-busy="true">
    <p class="splash-word">Nimbo</p>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
