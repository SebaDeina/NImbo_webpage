<!DOCTYPE html>
<html lang="es" data-hero="cinematic" data-grain="on">
<head>
  <script>
    try {
      var t = localStorage.getItem('nimbo_theme');
      document.documentElement.dataset.theme = t || 'light';
    } catch (e) {
      document.documentElement.dataset.theme = 'light';
    }
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="theme-color" content="#6665ff" />
  <meta name="description" content="NIMBO — Estudio digital. Diseño web, datos, inteligencia artificial y branding para marcas que quieren crecer." />
  <meta property="og:title" content="NIMBO — Estudio digital" />
  <meta property="og:description" content="Diseño web, datos, inteligencia artificial y branding para marcas que quieren crecer." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/hero-nubes.jpg" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preload" as="image" href="/hero-nubes.jpg" fetchpriority="high" />
  <title>NIMBO — Estudio digital · Web · Datos · IA · Branding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript><link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" /></noscript>
  <style>
    #lcp-hero{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;pointer-events:none}
    #splash{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;
      background:oklch(0.98 0.010 250);transition:opacity .45s cubic-bezier(.22,1,.36,1)}
    :root[data-theme="dark"] #splash{background:oklch(0.185 0.042 256)}
    #splash.done{opacity:0;pointer-events:none}
    .splash-word{margin:0;font-family:system-ui,-apple-system,sans-serif;font-size:clamp(52px,14vw,96px);
      font-weight:800;letter-spacing:-.045em;color:#6665ff;animation:splash-in .7s cubic-bezier(.22,1,.36,1) both}
    @keyframes splash-in{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}
    #root{position:relative;z-index:1}
  </style>
</head>
<body>
  <img
    id="lcp-hero"
    src="/hero-nubes.jpg"
    alt="Mar de nubes al atardecer visto desde el cielo, con cielo azul despejado en el horizonte"
    width="1024"
    height="572"
    fetchpriority="high"
    decoding="async"
  />
  <div id="splash" aria-live="polite" aria-busy="true">
    <p class="splash-word">Nimbo</p>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
