<!DOCTYPE html>
<html lang="es" data-hero="cinematic" data-grain="on">
<head>
  <script>
    try {
      var t = localStorage.getItem('nimbo_theme');
      document.documentElement.dataset.theme = t || 'light';
    } catch (e) {
      document.documentElement.dataset.theme = 'light';
    }
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="theme-color" content="#050e20" />
  <meta name="description" content="Nimbo — Automatización, IA y Páginas Web para que tu negocio escale sin límites." />
  <meta property="og:title" content="Nimbo — Automatización, IA y Páginas Web" />
  <meta property="og:description" content="Automatizamos procesos, analizamos datos y construimos presencia digital con IA." />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Nimbo — Automatización, IA y Páginas Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" /></noscript>
  <style>
    #splash{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;
      background:#ffffff;transition:opacity .45s ease}
    :root[data-theme="dark"] #splash{background:#050e20}
    #splash.done{opacity:0;pointer-events:none}
    .splash-word{margin:0;font-family:'Inter',system-ui,sans-serif;font-size:clamp(52px,14vw,96px);
      font-weight:800;letter-spacing:-.03em;color:#0a1628;animation:splash-in .7s ease both}
    :root[data-theme="dark"] .splash-word{color:#ffffff}
    @keyframes splash-in{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}
    #root{position:relative;z-index:1}
  </style>
</head>
<body>
  <div id="splash" aria-live="polite" aria-busy="true">
    <p class="splash-word">Nimbo</p>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
